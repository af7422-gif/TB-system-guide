<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>導覽主頁</title>

  <!-- 🔹 Bootstrap & Tippy -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/@popperjs/core@2"></script>
  <script src="https://unpkg.com/tippy.js@6"></script>

  <style>
    body {
      font-family: "Microsoft JhengHei", sans-serif;
      background-color: #f8f9fa;
      height: 100%;
      overflow-x: hidden;
      overflow: hidden;  /* ❌ 關閉全域卷軸，避免重複 */
      margin: 0;
    }

    /* 🔸 左側功能列 */
    #sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 280px;
      background: #f2f2f2;
      border-right: 2px solid #eee;
      padding: 1.25rem;
      overflow-y: auto;
      z-index: 100;
    }

    /* === 🔧 導覽右側貼齊左邊界 === */

    /* 移除 #content 的多餘內距 */
    #content {
      position: fixed;          /* ✅ 改成固定定位 */
      top: 0;
      left: 280px;              /* 剛好接在側欄右邊 */
      right: 0;                 /* ✅ 貼齊瀏覽器右邊 */
      bottom: 0;
      overflow-y: scroll;       /* 單一卷軸控制導覽內容 */
      overflow-x: hidden;
      scrollbar-gutter: stable; /* 保留捲軸空間，避免閃動 */
      background-color: #f8f9fa;
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }


        /* 讓 guide-wrapper 改用 block 模式避免 inline 間距 */
    .guide-wrapper {
      position: relative;
      display: block;
      width: 100%;
      height: auto;
      overflow: visible; /* ❌ 不要讓這層滾動 */
      margin: 0;
      padding: 0;
    }

    /* 圖片完全貼齊容器 */
    .system-bg {
      display: block;
      width: 100%;
      height: auto;
      border: 2px solid #ccc;
      border-radius: 8px;
      margin: 0;
    }

    /* 調整導覽頁面頂部與側邊欄之間的整體對齊 */
    body, #content {
      background-color: #f8f9fa;
    }


    /* 捲動條美化（可選） */
    #sidebar::-webkit-scrollbar {
      width: 8px;
    }
    #sidebar::-webkit-scrollbar-thumb {
      background: #ccc;
      border-radius: 6px;
    }

    /* 🔸 側邊書籤按鈕（像 bookmark tab） */
    #sidebarToggleTab {
      position: fixed;
      top: 50%;
      left: 280px;          /* ❶ 初始貼在 sidebar 右邊 */
      transform: translateY(-50%);
      width: 24px;
      height: 60px;
      background: #ffa500;
      color: white;
      border-radius: 0 8px 8px 0;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      z-index: 3000;
      font-size: 18px;
      font-weight: bold;
      user-select: none;
    }



    /* 🔸 收合 sidebar */
    #sidebar.collapsed {
      width: 0;
      padding: 0;
      overflow: hidden;
    }

    /* 🔸 收合時書籤靠最左側 */
    #sidebar.collapsed + #sidebarToggleTab {
      left: 0;
    }

    /* 🔸 收合時，右側導覽內容貼過來 */
    #content.expanded {
      left: 0 !important;
    }

  </style>
</head>

<body>

  <!-- 🟧 左側功能列 -->
  <div id="sidebar">
    <?!= include('help'); ?>
  </div>

  <div id="sidebarToggleTab">⟨</div>

  <!-- 🟩 右側導覽畫面 -->
  <div id="content">
    <?!= include('guide'); ?>
  </div>

  <!-- 🧠 共用函式模組 -->
  <?!= include('shared_help'); ?>
  <?!= include('shared_guide'); ?>
  <?!= include('tooltipFunction'); ?>
  
  <script>
    // =========================================
    // 🧭 初始化導覽主頁
    // =========================================
    function initGuidePage(guideData) {
      //console.log("🧭 initGuidePage() 啟動");

      // 導覽資料快取於全域
      window.guideData = guideData;

      // 初始化兩個子模組
      if (typeof initGuide === "function") initGuide(guideData);
      if (typeof initHelp === "function") initHelp(guideData);
    }

    document.addEventListener("DOMContentLoaded", () => {
      const sidebar = document.getElementById("sidebar");
      const content = document.getElementById("content");
      const tab = document.getElementById("sidebarToggleTab");

      let collapsed = false;

      tab.addEventListener("click", () => {
        collapsed = !collapsed;

        if (collapsed) {
          sidebar.classList.add("collapsed");
          content.classList.add("expanded");
          tab.textContent = "⟩";  // 展開箭頭
        } else {
          sidebar.classList.remove("collapsed");
          content.classList.remove("expanded");
          tab.textContent = "⟨";  // 收合箭頭
        }

        requestAnimationFrame(() => {
          // 🔸 重繪主圖熱區
          if (window.currentPage && window.guideCache) {
            renderHotspots(window.guideCache[window.currentPage]);
          }

          // 🔸 重繪一般表單（開啟表單）
          if (document.querySelector(".form-wrapper")) {
            updateFormOverlayPosition();
          }
        });
      });

    });

  </script>
</body>
</html>
